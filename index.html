<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu:Difficulty - Memory color</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        #elenco-difficolta{
            background-color: rgb(40, 40, 40);
            width: 40%;
            display: grid;
            gap: 20px;
            border-radius: 15px;
            grid-template-columns: repeat(1,1fr);
            padding: 30px 0;
        }

        div.bottoni-difficolta{
            width: 50%;
            background-color: rgb(60, 60, 60);
            margin: 30px auto;
            text-align: center;
            border-radius: 15px;
            padding: 5% 0;

            transition: all ease 0.2s;
        }

        div.bottoni-difficolta:hover{
            transform: scale(1.25);
        }

        #facile{
            color: greenyellow;
        }

        #medio{
            color: yellow;
        }

        #difficile{
            color: red;
        }

        #impossibile{
            color: rgb(255, 0, 255);
        }

        #dio{
            color: rgb(0, 0, 0);
        }
    </style>
</head>
<body>
    <header>
        <h1 id="title-game" class="undertale">Memory Color</h1>
    </header>
    <main id="elenco-difficolta">
        <a href="game.html">
            <div id="facile" class="bottoni-difficolta undertale">Facile</div>
        </a>
        <a href="game.html">
            <div id="medio" class="bottoni-difficolta undertale">Medio</div>
        </a>
        <a href="game.html">
            <div id="difficile" class="bottoni-difficolta undertale">Difficolta'</div>
        </a>
        <a href="game.html">
            <div id="impossibile" class="bottoni-difficolta undertale">Impossibile</div>
        </a>
        <a href="game.html">
            <div id="dio" class="bottoni-difficolta undertale">Dio</div>
        </a>
    </main>
    <script src="sceltaDifficolta.js"></script>
</body>
</html>
